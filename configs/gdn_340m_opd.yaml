run_name: gdn340m-fineweb-opd
output_dir: outputs
seed: 42

model_name: /data/wyr/models/hf/m-a-p/340M-20B-GatedDeltaNet-pure-baseline
tokenizer_name: null
expected_architecture: GatedDeltaNetForCausalLM
trust_remote_code: true
dtype: bf16
finetune_mode: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: []

dataset_name: /data/wyr/datasets/fineweb-edu-100b
dataset_config: default
dataset_split: train
dataset_text_field: text
shuffle_buffer_size: 10000
sanity_num_docs: 0
sanity_disable_shuffle: false

objective: opd_kl
context_len: 1024
prefix_len: 128
continuation_len: 128

micro_batch_size: 1
grad_accum_steps: 8
max_steps: 10000
learning_rate: 2.0e-5
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-8
warmup_steps: 500
max_grad_norm: 1.0

lambda_state: 0.1
state_key: recurrent_state
state_time_stride: 1

rollout_temperature: 1.0
rollout_top_p: 1.0
rollout_sync_steps: 50

log_interval: 20
save_interval: 500
keep_last_k_checkpoints: 2
wandb_enabled: false
wandb_project: opd
wandb_entity: null
wandb_run_name: null
wandb_tags: []
wandb_mode: online

resume_path: null
