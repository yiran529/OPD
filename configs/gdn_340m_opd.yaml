run_name: gdn340m-fineweb-opd
output_dir: outputs
seed: 42

model_name: m-a-p/340M-20B-GatedDeltaNet-pure-baseline
tokenizer_name: null
expected_architecture: GatedDeltaNetForCausalLM
trust_remote_code: true
dtype: bf16

dataset_name: HuggingFaceFW/fineweb-edu
dataset_config: sample-100BT
dataset_split: train
dataset_text_field: text
shuffle_buffer_size: 10000

objective: opd_kl
context_len: 1024
prefix_len: 128
continuation_len: 128

micro_batch_size: 1
grad_accum_steps: 8
max_steps: 10000
learning_rate: 2.0e-5
weight_decay: 0.1
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-8
warmup_steps: 500
max_grad_norm: 1.0

lambda_state: 0.1
ce_anchor_weight: 0.0

rollout_temperature: 1.0
rollout_top_p: 1.0
rollout_sync_steps: 50

log_interval: 20
save_interval: 500
keep_last_k_checkpoints: 2

resume_path: null
